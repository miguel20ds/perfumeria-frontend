<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Aroma Encantador - Mis reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/mis-reservas.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="inicio.html">Tu Aroma Encantador</a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small d-none d-md-inline">
                    <i class="bi bi-person-circle me-1"></i>
                    <span id="nombre-usuario"></span>
                </span>
                <a href="catalogo.html" class="btn btn-sm btn-outline-purple">
                    <i class="bi bi-grid me-1"></i>Catálogo
                </a>
                <button class="btn btn-sm btn-purple" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <div class="mb-4">
            <h2 class="section-title mb-1">Mis reservas</h2>
            <p class="text-muted small mb-0">Gestiona tus reservas activas</p>
        </div>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border" role="status" style="color: #7c3aed;"></div>
            <p class="mt-2 text-muted small">Cargando reservas...</p>
        </div>

        <div id="sin-reservas" class="text-center py-5 d-none">
            <i class="bi bi-bag-x fs-1 text-muted"></i>
            <p class="mt-2 text-muted">No tienes reservas aún.</p>
            <a href="catalogo.html" class="btn btn-purple btn-sm mt-2">
                <i class="bi bi-grid me-1"></i>Ver catálogo
            </a>
        </div>

        <div id="reservas-container" class="row g-4 d-none"></div>

    </div>

    <!-- Modal confirmar eliminación -->
    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-semibold">Cancelar reserva</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">¿Estás seguro de que deseas cancelar la reserva de <strong id="nombre-perfume-modal"></strong>?</p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn btn-light" data-bs-dismiss="modal">No, mantener</button>
                    <button class="btn btn-danger" onclick="confirmarEliminar()">
                        <i class="bi bi-trash me-1"></i>Sí, cancelar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensaje"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mis-reservas.js"></script>
</body>
</html>
