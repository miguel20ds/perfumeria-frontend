<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Aroma Encantador - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/catalogo.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="./inicio.html">Tu Aroma Encantador</a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small d-none d-md-inline">
                    <i class="bi bi-person-circle me-1"></i>
                    <span id="nombre-usuario"></span>
                </span>
                <a href="mis-reservas.html" class="btn btn-sm btn-outline-purple">
                    <i class="bi bi-bag me-1"></i><span data-i18n="nav.mis.reservas">Mis reservas</span>
                </a>
                <button class="btn btn-sm btn-purple" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right me-1"></i><span data-i18n="nav.salir">Salir</span>
                </button>
            </div>
            <div class="d-flex align-items-center gap-2 ms-3">
                <button onclick="cambiarIdioma('es')" class="btn btn-sm px-2 py-1" 
                        style="font-size:0.8rem; background: none; border: 1px solid #e5e7eb;">
                        🇨🇴 ES
                </button>
                <button onclick="cambiarIdioma('en')" class="btn btn-sm px-2 py-1"
                        style="font-size:0.8rem; background: none; border: 1px solid #e5e7eb;">
                        🇺🇸 EN
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
            <div>
                <h2 class="section-title mb-1" data-i18n="catalogo.titulo">Catálogo de perfumes</h2>
                <p class="text-muted small mb-0" data-i18n="catalogo.subtitulo">Descubre nuestra colección exclusiva</p>
            </div>
            <div class="input-group" style="max-width: 280px;">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search text-muted"></i>
                </span>
                <input type="text" id="buscador" class="form-control border-start-0 search-input" data-i18n="catalogo.buscar" placeholder="Buscar perfume...">
            </div>
        </div>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-purple" role="status" style="color: #7c3aed;"></div>
            <p class="mt-2 text-muted small" data-i18n="catalogo.cargando">Cargando perfumes...</p>
        </div>

        <div id="sin-resultados" class="text-center py-5 d-none">
            <i class="bi bi-search fs-1 text-muted"></i>
            <p class="mt-2 text-muted" data-i18n="catalogo.sin.resultados">No se encontraron perfumes.</p>
        </div>

        <div id="perfumes-grid" class="row g-4 d-none"></div>

    </div>

    <!-- Modal reserva -->
    <div class="modal fade" id="modalReserva" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-semibold" data-i18n="modal.reserva.titulo">Confirmar reserva</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted"><span data-i18n="modal.reserva.texto">¿Deseas reservar?</span><strong id="nombre-perfume-modal"></strong>?</p>
                    <div class="alert alert-info small">
                        <i class="bi bi-info-circle me-1"></i>
                        <span data-i18n="modal.reserva.info">Puedes recoger tu reserva en tienda durante nuestro horario de atención.</span>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn btn-light" data-bs-dismiss="modal" data-i18n="modal.reserva.cancelar">Cancelar</button>
                    <button class="btn btn-purple" onclick="confirmarReserva()">
                        <i class="bi bi-bag-check me-1"></i><span data-i18n="modal.reserva.confirmar">Confirmar reserva</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notificación -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensaje"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/api.js"></script>
    <script src="js/catalogo.js"></script>
</body>
</html>
