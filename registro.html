<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Aroma Encantador - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/registro.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar sticky-top" style="background: white; border-bottom: 1px solid #e5e7eb;">
        <div class="container">
            <a class="navbar-brand" href="inicio.html" 
                style="color: #7c3aed; font-weight: 800; letter-spacing: 2px;">
                TU AROMA ENCANTADOR
            </a>
            <div class="d-flex gap-2">
                <button onclick="cambiarIdioma('es')" class="btn btn-sm px-2 py-1"
                    style="font-size:0.8rem; background: none; border: 1px solid #e5e7eb;">
                    🇨🇴 ES
                </button>
                <button onclick="cambiarIdioma('en')" class="btn btn-sm px-2 py-1"
                    style="font-size:0.8rem; background: none; border: 1px solid #e5e7eb;">
                    🇺🇸 EN
                </button>
            </div>
        </div>
    </nav>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-12 col-sm-8 col-md-5 col-lg-4">

            <div class="text-center mb-4">
                <a href="inicio.html" class="text-decoration-none">
                    <h1 class="brand-title fs-2">Tu Aroma Encantador</h1>
                </a>
                <p class="text-muted small" data-i18n="registro.titulo">Crea tu cuenta</p>
            </div>

            <div class="card shadow-sm p-4">
                <h5 class="mb-4 fw-semibold" data-i18n="registro.titulo">Registro</h5>

                <div id="alerta" class="alert d-none" role="alert"></div>

                <div class="mb-3">
                    <label class="form-label small fw-medium" data-i18n="registro.nombre">Nombre completo</label>
                    <input type="text" id="nombre" class="form-control" data-i18n="registro.nombre" placeholder="Nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-medium" data-i18n="registro.email">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" data-i18n="registro.email" placeholder="correo@email.com">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-medium" data-i18n="registro.password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••">
                </div>

                <button class="btn btn-primary w-100 mb-3" onclick="registrarse()">
                    <span data-i18n="registro.btn">Crear cuenta</span>
                </button>

                <p class="text-center small text-muted mb-0">
                    <span data-i18n="registro.ya.cuenta">¿Ya tienes cuenta?</span>
                    <a href="index.html" class="text-purple text-decoration-none fw-medium" data-i18n="registro.inicia">Inicia sesión</a>
                </p>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/api.js"></script>
    <script src="js/registro.js"></script>
</body>
</html>
