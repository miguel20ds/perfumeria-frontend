<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Aroma Encantador - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/admin-usuarios.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">Tu Aroma Encantador</a>
            <span class="admin-badge ms-2">ADMIN</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAdmin">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navAdmin">
                <div class="navbar-nav ms-4 gap-3">
                    <a href="admin-perfumes.html" class="nav-link-admin">
                        <i class="bi bi-droplet me-1"></i>Perfumes
                    </a>
                    <a href="admin-reservas.html" class="nav-link-admin">
                        <i class="bi bi-bag me-1"></i>Reservas
                    </a>
                    <a href="admin-usuarios.html" class="nav-link-admin active">
                        <i class="bi bi-people me-1"></i>Usuarios
                    </a>
                </div>
                <div class="ms-auto d-flex align-items-center gap-3">
                    <span style="color: #c4b5fd;" class="small">
                        <i class="bi bi-person-circle me-1"></i>
                        <span id="nombre-usuario"></span>
                    </span>
                    <button class="btn btn-sm btn-purple" onclick="cerrarSesion()">
                        <i class="bi bi-box-arrow-right me-1"></i>Salir
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
            <div>
                <h2 class="section-title mb-1">Usuarios registrados</h2>
                <p class="text-muted small mb-0">Listado de todos los usuarios del sistema</p>
            </div>
            <div class="input-group" style="max-width: 280px;">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search text-muted"></i>
                </span>
                <input type="text" id="buscador" class="form-control border-start-0 search-input" placeholder="Buscar usuario...">
            </div>
        </div>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border" role="status" style="color: #7c3aed;"></div>
            <p class="mt-2 text-muted small">Cargando usuarios...</p>
        </div>

        <div id="tabla-container" class="card border-0 rounded-4 shadow-sm d-none">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Usuario</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Fecha registro</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="sin-usuarios" class="text-center py-5 d-none">
            <i class="bi bi-people fs-1 text-muted"></i>
            <p class="mt-2 text-muted">No hay usuarios registrados.</p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-usuarios.js"></script>
</body>
</html>
