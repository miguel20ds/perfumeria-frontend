<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Aroma Encantador - Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-12 col-sm-8 col-md-5 col-lg-4">

            <div class="text-center mb-4">
                <h1 class="brand-title fs-2">Tu Aroma Encantador</h1>
                <p class="text-muted small">Catálogo de perfumes exclusivos</p>
            </div>

            <div class="card shadow-sm p-4">
                <h5 class="mb-4 fw-semibold">Iniciar sesión</h5>

                <div id="alerta" class="alert alert-danger d-none" role="alert"></div>

                <div class="mb-3">
                    <label class="form-label small fw-medium">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="correo@email.com">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-medium">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••">
                </div>

                <button class="btn btn-primary w-100 mb-3" onclick="iniciarSesion()">
                    Iniciar sesión
                </button>

                <p class="text-center small text-muted mb-0">
                    ¿No tienes cuenta?
                    <a href="registro.html" class="text-purple text-decoration-none fw-medium">Regístrate</a>
                </p>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
